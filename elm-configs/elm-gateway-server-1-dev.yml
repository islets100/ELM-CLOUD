spring:
  application:
    name: elm-gateway-server
  cloud:
    gateway:
      httpclient:
        connect-timeout: 20000
        response-timeout: 20s
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods: "*"
      routes:
      - id: userServer
        uri: lb://elm-user-server
        predicates:
        - Path=/users/**
        filters:
        - name: CircuitBreaker
          args:
            name: userCircuitBreaker
            fallbackUri: forward:/userFallback

      - id: userApiServer
        uri: lb://elm-user-server
        predicates:
        - Path=/api/auth,/api/register,/api/user,/api/users/**,/api/persons,/api/password,/api/userById,/api/userByIdByPass,/api/userByUsername,/api/userExistsByUsername,/api/user/birthday/modification/check
        filters:
        - name: CircuitBreaker
          args:
            name: userCircuitBreaker
            fallbackUri: forward:/userFallback

      - id: businessServer
        uri: lb://elm-business-server
        predicates:
        - Path=/businesses/**
        filters:
        - name: CircuitBreaker
          args:
            name: businessCircuitBreaker
            fallbackUri: forward:/businessFallback
        - name: BusinessOrderTypeCacheGet
        - name: BusinessCacheGet

      - id: businessApiServer
        uri: lb://elm-business-server
        predicates:
        - Path=/api/businesses/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: businessCircuitBreaker
            fallbackUri: forward:/businessFallback
        - name: BusinessOrderTypeCacheGet
        - name: BusinessCacheGet

      - id: cartServer
        uri: lb://elm-cart-server
        predicates:
        - Path=/carts/**
        filters:
        - name: CircuitBreaker
          args:
            name: cartCircuitBreaker
            fallbackUri: forward:/cartFallback

      - id: cartApiServer
        uri: lb://elm-cart-server
        predicates:
        - Path=/api/carts/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: cartCircuitBreaker
            fallbackUri: forward:/cartFallback

      - id: deliveryServer
        uri: lb://elm-delivery-server
        predicates:
        - Path=/delivery-addresses/**
        filters:
        - name: CircuitBreaker
          args:
            name: deliveryCircuitBreaker
            fallbackUri: forward:/deliveryFallback

      - id: deliveryApiServer
        uri: lb://elm-delivery-server
        predicates:
        - Path=/api/delivery-addresses/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: deliveryCircuitBreaker
            fallbackUri: forward:/deliveryFallback

      - id: ordersServer
        uri: lb://elm-order-server
        predicates:
        - Path=/orders/**
        filters:
        - name: CircuitBreaker
          args:
            name: orderCircuitBreaker
            fallbackUri: forward:/orderFallback

      - id: ordersApiServer
        uri: lb://elm-order-server
        predicates:
        - Path=/api/orders/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: orderCircuitBreaker
            fallbackUri: forward:/orderFallback

      - id: pointServer
        uri: lb://elm-point-server
        predicates:
        - Path=/points/**
        filters:
        - name: CircuitBreaker
          args:
            name: pointCircuitBreaker
            fallbackUri: forward:/pointFallback

      - id: pointApiServer
        uri: lb://elm-point-server
        predicates:
        - Path=/api/points/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: pointCircuitBreaker
            fallbackUri: forward:/pointFallback

      - id: integralApiServer
        uri: lb://elm-point-server
        predicates:
        - Path=/api/integral/**,/api/promotion-day/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: integralCircuitBreaker
            fallbackUri: forward:/pointFallback

      - id: walletServer
        uri: lb://elm-wallet-server
        predicates:
        - Path=/wallet/**
        filters:
        - name: CircuitBreaker
          args:
            name: walletCircuitBreaker
            fallbackUri: forward:/walletFallback

      - id: walletApiServer
        uri: lb://elm-wallet-server
        predicates:
        - Path=/api/wallet/**,/api/vip/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: walletCircuitBreaker
            fallbackUri: forward:/walletFallback

      - id: foodServer
        uri: lb://elm-food-server
        predicates:
        - Path=/foods/**
        filters:
        - name: CircuitBreaker
          args:
            name: foodCircuitBreaker
            fallbackUri: forward:/foodFallback
        - name: FoodCacheGet
        - name: BusinessFoodCacheGet

      - id: foodApiServer
        uri: lb://elm-food-server
        predicates:
        - Path=/api/foods/**
        filters:
        - RewritePath=/api/(?<segment>.*), /${segment}
        - name: CircuitBreaker
          args:
            name: foodCircuitBreaker
            fallbackUri: forward:/foodFallback
        - name: FoodCacheGet
        - name: BusinessFoodCacheGet
    loadbalancer:
      eager-load:
        clients:
        - elm-user-server
        - elm-business-server
        - elm-food-server
        - elm-cart-server
        - elm-delivery-server
        - elm-order-server
        - elm-point-server
        - elm-wallet-server
