logging:
  level:
    '[org.springframework]': debug
    '[team.tjusw.mapper]': debug
    '[org.springframework.boot.autoconfigure]': error

spring:
  application:
    name:   elm-user-server
  datasource:
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:elm2}?characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: team.tjusw.po

jwt:
  secret: ${JWT_SECRET:elm-cloud-user-service-dev-secret-key-please-change-1234567890-abcdefghijk}
  token-validity-in-seconds: ${JWT_TOKEN_VALIDITY_SECONDS:86400}
  token-validity-in-seconds-for-remember-me: ${JWT_TOKEN_VALIDITY_REMEMBER_ME_SECONDS:2592000}
