spring:
  application:
    name: elm-point-server-test
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
    bus:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.config.client.ConfigClientAutoConfiguration
      - org.springframework.cloud.client.discovery.composite.CompositeDiscoveryClientAutoConfiguration

  h2:
    console:
      enabled: true

mybatis:
  type-aliases-package: team.tjusw.elm.po
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    team.tjusw.elm.mapper: DEBUG
    org.springframework.test: INFO
    com.netflix.discovery: OFF
    org.springframework.cloud: OFF

# 测试配置
eureka:
  client:
    enabled: false

