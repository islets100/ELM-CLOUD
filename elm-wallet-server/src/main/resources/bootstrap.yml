spring:
  cloud:
    config:
      enabled: false
    bus:
      enabled: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:13000/eureka/
    fetch-registry: true
    register-with-eureka: true

server:
  port: 18000
