spring:
  cloud:
    config:
      name: elm-wallet-server-1
      profile: dev
      label: elm-configs
      uri: http://localhost:15001
      discovery:
        enabled: true
        service-id: elm-config-server
    bus:
      enabled: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:13000/eureka/
    fetch-registry: true
    register-with-eureka: true

server:
  port: 18000
